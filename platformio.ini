; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
; Underclock from the 600MHz default to cut heat — the i.MX RT1062 thermal-panics
; near ~95C in the sealed engine-bay enclosure. 150MHz is the lowest mainstream
; clock that keeps USB/CAN/SPI/I2C fully functional. (Plus heatsinks on the chip.)
board_build.f_cpu = 150000000L
extra_scripts = pre:cnext_build.py
build_flags = -I include
build_src_filter = +<*> -<pid_bench.cpp>
lib_deps =
	https://github.com/tonton81/FlexCAN_T4
    https://github.com/adafruit/Adafruit_BusIO
    https://github.com/adafruit/Adafruit_ADS1X15
    adafruit/Adafruit MAX31856 library
    adafruit/Adafruit FRAM SPI
    Wire
    SPI

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<control/exhaustBrakeLogic.cpp> +<sensors/j1939Decode.cpp>
build_flags = -I src -I include
