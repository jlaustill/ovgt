; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
; CPU clock. The old (failed) Teensy thermal-panicked (~95C i.MX RT1062 ceiling)
; even at 150MHz; the new healthy chip idles <40C at 150MHz. Trying 600MHz (the
; default) on the new chip while monitoring MCU temp (debug line) — fall back to
; 150000000L if it runs too hot for the sealed engine-bay enclosure.
board_build.f_cpu = 600000000L
extra_scripts = pre:cnext_build.py
build_flags = -I include
build_src_filter = +<*> -<pid_bench.cpp> -<actuator_selftest.cpp>
lib_deps =
	https://github.com/tonton81/FlexCAN_T4
    https://github.com/adafruit/Adafruit_BusIO
    https://github.com/adafruit/Adafruit_ADS1X15
    adafruit/Adafruit MAX31856 library
    adafruit/Adafruit FRAM SPI
    Wire
    SPI

; Parked bench test of the VGT actuator — sweeps demand 0<->88 with no
; backpressure and watches CAN feedback. Compiles ONLY the real Actuator scope
; + the test main, so the teensy41 firmware is untouched.
;   Flash test:  pio run -e actuator_test -t upload
;   Restore:     pio run -e teensy41 -t upload
[env:actuator_test]
platform = teensy
board = teensy41
framework = arduino
board_build.f_cpu = 600000000L
upload_protocol = teensy-cli
extra_scripts = pre:cnext_build.py
build_flags = -I include
build_src_filter = -<*> +<display/actuator.cpp> +<actuator_selftest.cpp>
lib_deps =
	https://github.com/tonton81/FlexCAN_T4

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<control/exhaustBrakeLogic.cpp> +<control/boostBprLogic.cpp> +<sensors/j1939Decode.cpp> +<sensors/j1939Health.cpp> +<sensors/j1939Encode.cpp> +<sensors/compressorEfficiency.cpp> +<sensors/cotSettle.cpp> +<domain/json.c> +<domain/systemHealthLogic.c>
build_flags = -I src -I include
